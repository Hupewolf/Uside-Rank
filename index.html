<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400;1,700&family=Be+Vietnam+Pro:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Kaushan+Script&family=Michroma&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Mountains+of+Christmas:wght@400;700&family=Mulish:ital,wght@0,200..1000;1,200..1000&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/trangchu.css">
    <title>Funny</title>
</head>
<body>
    <header>
        <div class="logo">
            <div class="inner-logo1">U</div>   
            <div class="inner-logo2">Uside</div>   
        </div>
        <div class="component">
            <div class="searchbox">
                <div class="kinhlup"></div>
                <input type="text" placeholder="Tìm kiếm...">
            </div>
            <div class="notification">
                <div class="bell"></div>
                <div class="new">3</div>
            </div>
            <div class="avatar"></div>
        </div>
    </header>
    <section class="main">
        <div class="left-main">
            <div class="card profile-card">
                <div class="inner-profile-card">
                    <div class="profile-left">
                        <div class="avatar-big">
                            <div class="inner-avatar-big"></div>
                        </div>
                    
                        <div class="rank-info">
                            <p>Hạng Hiện Tại</p>
                            <div class="rank-badge">
                                Vững Tay 
                            </div>
                        </div>
                        <div class="score">
                            <p>Điểm:</p>
                            <h2>4,520</h2>
                        </div>
                    </div>
                    <div class="profile-right">
                        <div class="rank-bars">
                            <div class="bar bar1"></div>
                            <div class="bar bar2"></div>
                        </div>
                        <div class="rank-type">
                            <span class="dot dot1"></span> Cao nhất
                            <span class="dot dot2"></span> Cá nhân
                            <span class="dot dot3"></span> Nhóm
                        </div>
                    </div>
                </div>

                <div class="progress-line"></div>

            </div>

            <!-- CARD 2 -->
            <div class="card progress-card">

                <div class="progress-item">
                    Còn 380 điểm đến hạng 4
                </div>

                <div class="progress-item">
                    Chuỗi Ngày: 12 
                </div>

                <div class="progress-item">
                    Trung Bình: 310 điểm
                </div>

            </div>

            <!-- CARD 3 -->
            <div class="card goal-card">

                <div class="goal-image"></div>

                <div class="goal-text">
                    Mục Tiêu Kế Tiếp: <b>2 Khóa Học</b>
                </div>

            </div>
        </div>

        <div class="center-main">
            <div class="card leaderboard">
                <div class="leaderboard-header">
                    <h3>Bảng Xếp Hạng</h3>
                </div>

                <div class="leaderboard-list">
                    <div class="rank-item gold">
                        <span>1</span>
                        <span>Trọng Nhân</span>
                        <span>6.800</span>
                    </div>

                    <div class="rank-item silver">
                        <span>2</span>
                        <span>Lâm Khang</span>
                        <span>6.250</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="right-main">
            <div class="right-main">
                <div class="card mission-card">
                    nhiệm vụ
                </div>

                <div class="card guide-card">
                    hướng dẫn
                </div>
            </div>
        </div>
    </section>
</body>
</html>
